version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gosec:
      excludes: []
    revive:
      rules:
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      # Test files commonly use 0o644 for temporary files and read files by
      # path; these are standard test patterns, not production concerns.
      - path: ".*_test\\.go"
        linters:
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
