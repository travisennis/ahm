# git-cliff configuration.
#
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable user-facing changes to `ahm` are recorded here.

"""
body = """
{% if version %}\
## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}**breaking:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = true
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^perf", group = "<!-- 2 -->Changed" },
  { message = "^refactor", group = "<!-- 2 -->Changed" },
  { message = "^build", group = "<!-- 3 -->Build" },
  { message = "^ci", group = "<!-- 3 -->Build" },
  { message = "^docs?", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Tests" },
  { message = "^chore\\(release\\): prepare", skip = true },
  { message = "^chore", group = "<!-- 6 -->Maintenance" },
  { message = "^revert", group = "<!-- 7 -->Reverted" },
  { message = ".*", group = "<!-- 8 -->Other" },
]
